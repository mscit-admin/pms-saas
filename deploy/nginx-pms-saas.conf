# PMS (SaaS متعدّد المستأجرين) — Nginx عكسي مع نطاقات فرعية لكل مستأجر.
# انسخه إلى /etc/nginx/sites-available/pms ثم فعّله بـ symlink وأعد التحميل.
#
# الطوبولوجيا (مهمّة لتعدّد المستأجرين):
#   - /api/*  تذهب مباشرةً إلى خدمة الـ API (المنفذ 4448) مع الحفاظ على Host،
#             كي يستخرج المستأجر من النطاق الفرعي (acme.example.com ⇒ acme).
#   - / (الباقي) تذهب إلى خدمة الواجهة web (المنفذ 4447).
#
# DNS: سجّل A للنطاق الجذر + wildcard:  example.com  و  *.example.com → IP الخادم.

server {
    listen 80;
    # يطابق النطاق الجذر وكل النطاقات الفرعية للمستأجرين
    server_name example.com *.example.com;   # غيّر example.com إلى نطاقك

    client_max_body_size 12m;

    # خدمة الـ API مباشرةً — الحفاظ على Host ضروري لتحديد المستأجر
    location /api/ {
        proxy_pass http://127.0.0.1:4448;
        proxy_http_version 1.1;
        proxy_set_header Host $host;                 # ← يحمل النطاق الفرعي للمستأجر
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # الواجهة (Next.js)
    location / {
        proxy_pass http://127.0.0.1:4447;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

# HTTPS (بعد إصدار شهادة wildcard، مثلاً عبر certbot DNS-01 لـ *.example.com):
#   listen 443 ssl;  ssl_certificate ...;  ssl_certificate_key ...;
#   ثم فعّل COOKIE_SECURE=true في .env.
