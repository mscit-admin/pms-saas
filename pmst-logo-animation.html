<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>PMST — شعار متحرك</title>
<style>
  :root{ --blue:#1f4fd0; --blue2:#3b82f6; --navy:#16307a; --ink:#13233f; }
  *{ box-sizing:border-box; }
  html,body{ margin:0; height:100%; }
  body{
    display:grid; place-items:center; min-height:100vh;
    background:
      radial-gradient(120% 120% at 50% 35%, #ffffff 0%, #eef3fb 55%, #e3ecfa 100%);
    font-family:"Segoe UI",Tahoma,Arial,sans-serif; color:var(--ink);
  }
  .stage{ width:min(86vw,560px); aspect-ratio:1/1; position:relative; }
  svg{ width:100%; height:100%; display:block; overflow:visible; }

  /* ——— حلقة المسار + السهم ——— */
  .ring{ fill:none; stroke:url(#ringGrad); stroke-width:10; stroke-linecap:round;
         filter:drop-shadow(0 0 6px rgba(59,130,246,.45)); }
  .ringTrail{ stroke-dasharray:980; stroke-dashoffset:980; animation:draw 1.4s ease-out .1s forwards; }
  @keyframes draw{ to{ stroke-dashoffset:0; } }

  /* ——— حرف P ——— */
  .p-letter{ font:900 270px/1 "Arial Black",Impact,Arial,sans-serif; fill:url(#pGrad);
             filter:url(#glow); opacity:.25; transform-box:fill-box; transform-origin:center;
             animation:pPower 6s ease-in-out infinite; }
  @keyframes pPower{
    0%,18%   { opacity:.22; filter:url(#glow); }
    38%      { opacity:.7; }
    52%      { opacity:1; filter:url(#glowStrong); transform:scale(1.04); }
    60%      { transform:scale(1); }
    78%,100% { opacity:1; filter:url(#glow); }
  }

  /* ——— تيارات البيانات الداخلة إلى P ——— */
  .stream{ stroke:url(#dataGrad); stroke-width:2.4; fill:none; stroke-linecap:round;
           stroke-dasharray:14 12; opacity:0; animation:flow 6s linear infinite; }
  @keyframes flow{
    0%,22%  { opacity:0; stroke-dashoffset:0; }
    30%     { opacity:.9; }
    52%     { opacity:.9; stroke-dashoffset:-160; }
    66%,100%{ opacity:0; stroke-dashoffset:-220; }
  }

  /* ——— التذكرة الدائرة ——— */
  .ticket{ offset-path:path("M280,60 a220,220 0 1 0 .1,0");
           offset-rotate:0deg; animation:orbit 6s ease-in-out infinite; }
  @keyframes orbit{
    0%   { offset-distance:0%;  opacity:0; transform:scale(.7); }
    6%   { opacity:1; transform:scale(1); }
    24%  { offset-distance:60%; opacity:1; transform:scale(1); }
    30%  { offset-distance:72%; opacity:0; transform:scale(.5); }   /* تتفكّك */
    31%,100%{ opacity:0; }
  }
  .ticketCard{ fill:#fff; stroke:#d7e0f0; stroke-width:1.5; filter:drop-shadow(0 6px 12px rgba(20,40,90,.18)); }

  /* جزيئات التفكّك */
  .spark{ fill:var(--blue2); opacity:0; }
  .spark{ animation:sparkle 6s ease-in infinite; }
  @keyframes sparkle{
    0%,26%{ opacity:0; transform:translate(0,0) scale(1); }
    30%   { opacity:1; }
    46%   { opacity:.8; }
    56%,100%{ opacity:0; }
  }

  /* ——— الومضة ——— */
  .flash{ fill:#fff; opacity:0; transform-box:fill-box; transform-origin:center;
          animation:flash 6s ease-in-out infinite; }
  @keyframes flash{
    0%,55%{ opacity:0; transform:scale(.2); }
    60%   { opacity:.92; transform:scale(1.1); }
    70%   { opacity:0; transform:scale(1.4); }
    100%  { opacity:0; }
  }

  /* ——— الأيقونات والشعارات الثانوية ——— */
  .fadeLate{ opacity:0; animation:fadeLate 6s ease-out infinite; }
  @keyframes fadeLate{ 0%,62%{opacity:0; transform:translateY(6px);} 74%,100%{opacity:1; transform:translateY(0);} }

  .badge8 circle{ fill:url(#badgeGrad); }
  .badge8 text{ fill:#fff; font:700 26px "Segoe UI",Arial; }
  .check{ fill:#22c55e; } .dots{ fill:#f5b301; }

  /* ——— نص PMST النهائي ——— */
  .brand{ position:absolute; inset:auto 0 6% 0; text-align:center; opacity:0;
          animation:brandIn 6s ease-out infinite; }
  @keyframes brandIn{ 0%,66%{opacity:0; transform:translateY(14px);} 80%,100%{opacity:1; transform:translateY(0);} }
  .brand .title{ font:900 clamp(34px,9vw,58px) "Arial Black",Arial; letter-spacing:2px;
                 background:linear-gradient(180deg,#2a5bd7,#16307a); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .brand .sub{ font:600 clamp(11px,2.6vw,15px) "Segoe UI",Arial; color:#5a6b86; letter-spacing:1px; margin-top:2px; }

  .replay{ position:absolute; top:10px; inset-inline-start:10px; font-size:12px; color:#6b7a93;
           background:#fff; border:1px solid #d7e0f0; border-radius:20px; padding:6px 12px; cursor:pointer; }
</style>
</head>
<body>
  <div class="stage" id="stage">
    <button class="replay" onclick="replay()">↻ إعادة</button>
    <svg viewBox="0 0 560 560" id="logo">
      <defs>
        <linearGradient id="ringGrad" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0" stop-color="#7eb0ff"/><stop offset=".5" stop-color="#2f6bf0"/><stop offset="1" stop-color="#16307a"/>
        </linearGradient>
        <linearGradient id="pGrad" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0" stop-color="#3b82f6"/><stop offset="1" stop-color="#16307a"/>
        </linearGradient>
        <linearGradient id="dataGrad" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0" stop-color="#7eb0ff" stop-opacity="0"/><stop offset="1" stop-color="#2f6bf0"/>
        </linearGradient>
        <linearGradient id="badgeGrad" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0" stop-color="#3b82f6"/><stop offset="1" stop-color="#1f4fd0"/>
        </linearGradient>
        <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="glowStrong" x="-70%" y="-70%" width="240%" height="240%">
          <feGaussianBlur stdDeviation="16" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>

      <!-- المسار الدائري -->
      <circle class="ring ringTrail" cx="280" cy="280" r="220"/>
      <!-- رأس السهم -->
      <path class="ring fadeLate" d="M470,300 l26,-14 l-2,30 z" stroke-width="0" fill="#16307a"/>

      <!-- تيارات بيانات تتدفّق نحو P -->
      <path class="stream" d="M70,250 H210"/>
      <path class="stream" d="M60,290 H205" style="animation-delay:.15s"/>
      <path class="stream" d="M80,330 H210" style="animation-delay:.3s"/>

      <!-- حرف P -->
      <text class="p-letter" x="285" y="375" text-anchor="middle">P</text>

      <!-- جزيئات التفكّك -->
      <g>
        <circle class="spark" cx="150" cy="230" r="4"/><circle class="spark" cx="180" cy="200" r="3" style="animation-delay:.1s"/>
        <circle class="spark" cx="130" cy="300" r="3" style="animation-delay:.05s"/><circle class="spark" cx="200" cy="330" r="4" style="animation-delay:.15s"/>
        <circle class="spark" cx="170" cy="360" r="3" style="animation-delay:.2s"/><circle class="spark" cx="110" cy="260" r="2.5" style="animation-delay:.08s"/>
      </g>

      <!-- التذكرة الدائرة -->
      <g class="ticket">
        <g transform="translate(-46,-30)">
          <rect class="ticketCard" x="0" y="0" width="92" height="58" rx="8"/>
          <text x="10" y="20" font="700 11px Segoe UI" fill="#16307a" style="font:700 11px Segoe UI,Arial">TICKET</text>
          <text x="10" y="36" fill="#2f6bf0" style="font:700 12px Segoe UI,Arial">PMST-1267</text>
          <text x="10" y="50" fill="#7a8aa3" style="font:400 9px Segoe UI,Arial">Bug Fix — Login</text>
        </g>
      </g>

      <!-- شيفرونات يسار (Jira-like) -->
      <g class="fadeLate" fill="#1f4fd0">
        <path d="M40,150 l34,26 l-34,26 v-20 l8,-6 l-8,-6 z" opacity=".95"/>
        <path d="M70,150 l34,26 l-34,26 v-20 l8,-6 l-8,-6 z" opacity=".7"/>
      </g>

      <!-- شارة 8 -->
      <g class="badge8 fadeLate" transform="translate(470,360)">
        <circle r="30"/><text text-anchor="middle" y="9">8</text>
      </g>

      <!-- علامة الصح والنقاط -->
      <g class="fadeLate" transform="translate(210,500)">
        <circle class="check" r="20"/><path d="M-9,0 l6,7 l12,-14" stroke="#fff" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      </g>
      <g class="fadeLate" transform="translate(285,505)">
        <circle class="dots" r="20"/><g fill="#fff"><circle cx="-8" r="3"/><circle cx="0" r="3"/><circle cx="8" r="3"/></g>
      </g>

      <!-- الومضة -->
      <circle class="flash" cx="285" cy="290" r="120"/>
    </svg>

    <div class="brand">
      <div class="title">PMST</div>
      <div class="sub">Project Management &amp; Sprint Tracking</div>
    </div>
  </div>

<script>
  function replay(){
    const s = document.getElementById('logo');
    const b = document.querySelector('.brand');
    [s,b].forEach(el=>{ el.style.animation='none'; void el.offsetWidth; el.style.animation=''; });
    // إعادة تشغيل كل العناصر المتحرّكة
    document.querySelectorAll('#stage *').forEach(el=>{
      const a = el.style.animationName; el.style.animation='none'; void el.offsetWidth; el.style.animation='';
    });
    location.reload();
  }
</script>
</body>
</html>
