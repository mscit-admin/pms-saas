# تشغيل PMS (SaaS متعدّد المستأجرين) كخدمات مصغّرة: قاعدة + إقلاع + API + عامل + واجهة.
# الإقلاع:  cp .env.docker.example .env  ثم  docker compose up -d --build
# خدمة bootstrap تُهيّئ قاعدة التحكّم وتوفّر المنظمة الافتراضية (BOOTSTRAP_TENANT_SLUG).

services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-rootpass}
      # قاعدة التحكّم تُنشأ تلقائياً؛ نمهّدها هنا أيضاً للوضوح.
      MYSQL_DATABASE: ${CONTROL_DB_NAME:-pms_control}
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_PASSWORD:-rootpass}"]
      interval: 5s
      timeout: 5s
      retries: 20

  # إقلاع الـ SaaS (لمرّة واحدة ثم يخرج): قاعدة التحكّم + توفير/ترقية المنظمة الافتراضية.
  bootstrap:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    command: ["node", "/app/packages/core/scripts/bootstrap.js"]
    env_file: .env
    environment:
      DB_HOST: db
      DB_PORT: "3306"
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DB_HOST: db
      DB_PORT: "3306"
      API_PORT: "3001"
      # طابور إصدار شهادات TLS للعملاء الجدد (يقرأه deploy/cert-worker.sh على المضيف)
      CERT_QUEUE_FILE: /app/cert-queue/pending.txt
    volumes:
      - uploads:/app/services/api/uploads
      - ./cert-queue:/app/cert-queue
      # قراءة إحصاءات حاويات Docker لبطاقة «موارد المنصّة» (للقراءة فقط).
      # أمان: يمنح وصولاً للمضيف — احذف هذا السطر إن لم ترغب بعرض الموارد.
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      db:
        condition: service_healthy
      bootstrap:
        condition: service_completed_successfully
    expose:
      - "3001"
    # نُنشر الـ API على localhost فقط كي يوجّه nginx مسارات /api مباشرةً إليه
    # محافظاً على ترويسة Host (لازمة لتحديد المستأجر من النطاق الفرعي).
    ports:
      - "127.0.0.1:${API_HOST_PORT:-4448}:3001"

  worker:
    build:
      context: .
      dockerfile: services/worker/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DB_HOST: db
      DB_PORT: "3306"
    depends_on:
      db:
        condition: service_healthy
      bootstrap:
        condition: service_completed_successfully

  web:
    build:
      context: .
      dockerfile: services/web/Dockerfile
    restart: unless-stopped
    # يحتاج SESSION_SECRET/SYNC_SECRET نفسه ليتحقّق حارسُه من جلسة وقّعتها خدمة الـ API
    env_file: .env
    environment:
      API_URL: http://api:3001
    depends_on:
      - api
    ports:
      - "${WEB_PORT:-4447}:3000"

volumes:
  db-data:
  uploads:
